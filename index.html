<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pizza Azura — Pesan pizza favorit Anda secara digital. Pilih menu, topping, dan langsung checkout tanpa antri!">
    <title>Pizza Azura — Digital Ordering</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍕</text></svg>">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="header-inner">
        <a href="index.html" class="logo">
            <span class="logo-icon">🍕</span>
            <span class="logo-text">Pizza Azura</span>
        </a>
        <div class="nav-links">
            <a href="admin.html" class="nav-link">🔧 Admin</a>
            <button class="cart-btn" id="openCartBtn" onclick="openCart()">
                🛒 Keranjang
                <span class="cart-badge" id="cartBadge">0</span>
            </button>
        </div>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <h1>Pesan <span>Pizza</span> Favoritmu<br>Tanpa Antri!</h1>
    <p>Pilih menu, tambahkan topping, dan checkout langsung dari HP kamu. Cepat, mudah, tanpa ribet! 🔥</p>
</section>

<!-- CATEGORY TABS -->
<div class="category-tabs">
    <button class="tab-btn active" onclick="filterMenu('all')">🍕 Semua</button>
    <button class="tab-btn" onclick="filterMenu('classic')">⭐ Classic</button>
    <button class="tab-btn" onclick="filterMenu('premium')">👑 Premium</button>
</div>

<!-- MENU GRID -->
<section class="menu-section">
    <div class="menu-grid" id="menuGrid">
        <!-- Rendered by JS -->
    </div>
</section>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
    <div class="modal">
        <div class="modal-header">
            <h2>Detail Menu</h2>
            <button class="modal-close" onclick="closeModal('detailModal')">&times;</button>
        </div>
        <div id="detailContent">
            <!-- Rendered by JS -->
        </div>
    </div>
</div>

<!-- CART MODAL -->
<div class="modal-overlay" id="cartModal">
    <div class="modal">
        <div class="modal-header">
            <h2>🛒 Keranjang</h2>
            <button class="modal-close" onclick="closeModal('cartModal')">&times;</button>
        </div>
        <div id="cartContent">
            <!-- Rendered by JS -->
        </div>
    </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-overlay" id="checkoutModal">
    <div class="modal">
        <div class="modal-header">
            <h2>📋 Checkout</h2>
            <button class="modal-close" onclick="closeModal('checkoutModal')">&times;</button>
        </div>
        <div id="checkoutContent">
            <!-- Rendered by JS -->
        </div>
    </div>
</div>

<!-- ORDER SUCCESS MODAL -->
<div class="modal-overlay" id="successModal">
    <div class="modal">
        <div id="successContent" style="text-align:center; padding: 20px 0;">
            <!-- Rendered by JS -->
        </div>
    </div>
</div>

<!-- ORDER STATUS VIEW (hidden by default) -->
<div id="statusView" style="display:none;">
    <div class="status-container">
        <a href="#" class="back-btn" onclick="hideStatusView()">← Kembali ke Menu</a>
        <div class="status-card" id="statusCard">
            <!-- Rendered by JS -->
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
