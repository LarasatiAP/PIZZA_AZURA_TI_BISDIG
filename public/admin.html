<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pizza Azura — Admin Dashboard">
    <title>Pizza Azura — Admin</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍕</text></svg>">
    <style>
        #authLoading {
            position: fixed; inset: 0;
            background: var(--bg-primary);
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 16px; z-index: 9999;
        }
        #authLoading .auth-spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        #authLoading p { color: var(--text-muted); font-size: 14px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .admin-user-info {
            display: flex; align-items: center; gap: 10px;
            color: var(--text-secondary); font-size: 14px;
        }
        .admin-user-info .user-avatar {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 14px; font-weight: 700; color: white;
        }
        .logout-btn {
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
            color: #fca5a5; padding: 8px 16px; border-radius: 8px;
            font-size: 13px; font-family: 'Outfit', sans-serif; font-weight: 600;
            cursor: pointer; transition: background 0.2s, border-color 0.2s;
        }
        .logout-btn:hover { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.5); }
    </style>
</head>
<body>

<!-- AUTH LOADING SCREEN -->
<div id="authLoading">
    <span style="font-size:40px">🍕</span>
    <div class="auth-spinner"></div>
    <p>Memeriksa sesi...</p>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard" style="display:none;">
    <header class="admin-header">
        <div class="admin-header-inner">
            <a href="/admin" class="admin-logo">
                <span class="logo-icon">🍕</span>
                <span class="logo-text">Pizza Azura</span>
                <span class="admin-badge">ADMIN</span>
            </a>
            <div class="admin-actions" style="display:flex;align-items:center;gap:12px;">
                <div class="admin-user-info">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <span id="adminUsername">Admin</span>
                </div>
                <button class="reset-btn" onclick="resetData()">🔄 Reset Data</button>
                <button class="logout-btn" onclick="doLogout()">🚪 Logout</button>
            </div>
        </div>
    </header>

    <main class="admin-main">
        <div class="stats-row" id="statsRow"></div>
        <div class="section-header">
            <h2 class="section-title">📋 Daftar Pesanan</h2>
            <div class="filter-tabs">
                <button class="filter-btn active" onclick="filterOrders('all', this)">Semua</button>
                <button class="filter-btn" onclick="filterOrders('pending', this)">⏳ Pending</button>
                <button class="filter-btn" onclick="filterOrders('done', this)">✅ Selesai</button>
            </div>
        </div>
        <div class="order-list" id="orderList"></div>
    </main>
</div>

<!-- ORDER DETAIL POPUP -->
<div class="modal-overlay" id="orderDetailModal">
    <div class="modal-popup">
        <button class="modal-close" onclick="closeOrderDetail()">&times;</button>
        <div id="orderDetailContent"></div>
    </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/admin.js"></script>
</body>
</html>
