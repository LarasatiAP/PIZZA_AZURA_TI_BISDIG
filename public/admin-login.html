<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Azura — Admin Login</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍕</text></svg>">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo .logo-emoji {
            font-size: 52px;
            display: block;
            margin-bottom: 12px;
        }

        .login-logo h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-logo p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 4px;
        }

        .login-badge {
            display: inline-block;
            background: rgba(255, 107, 53, 0.12);
            border: 1px solid rgba(255, 107, 53, 0.3);
            color: var(--accent);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            background: var(--bg-secondary);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            color: var(--text-primary);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-muted);
            padding: 4px;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: var(--text-primary);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), #e85d25);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
            margin-top: 8px;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:hover:not(:disabled) {
            opacity: 0.92;
            box-shadow: 0 6px 28px rgba(255, 107, 53, 0.5);
        }

        .login-btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-msg.show {
            display: flex;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 13px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-secondary);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <span class="logo-emoji">🍕</span>
            <h1>Pizza Azura</h1>
            <p>Masuk ke panel admin</p>
            <span class="login-badge">ADMIN ACCESS</span>
        </div>

        <div class="error-msg" id="errorMsg">
            <span>⚠️</span>
            <span id="errorText">Username atau password salah.</span>
        </div>

        <div class="form-group">
            <label for="username">Username</label>
            <input
                type="text"
                id="username"
                class="form-input"
                placeholder="Masukkan username"
                autocomplete="username"
                autofocus
            >
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
                <input
                    type="password"
                    id="password"
                    class="form-input"
                    placeholder="Masukkan password"
                    autocomplete="current-password"
                    style="padding-right: 48px;"
                >
                <button class="toggle-password" onclick="togglePassword()" type="button" id="toggleBtn">👁️</button>
            </div>
        </div>

        <button class="login-btn" id="loginBtn" onclick="handleLogin()">
            <div class="spinner" id="spinner"></div>
            <span id="loginBtnText">🔐 Masuk</span>
        </button>

        <a href="/" class="back-link">← Kembali ke halaman utama</a>
    </div>
</div>

<script>
    // If already logged in, redirect to admin
    const savedToken = sessionStorage.getItem('adminToken');
    if (savedToken) {
        fetch('/api/auth/check', {
            headers: { 'Authorization': 'Bearer ' + savedToken }
        }).then(r => {
            if (r.ok) window.location.href = '/admin';
        }).catch(() => {});
    }

    // Allow Enter key to submit
    document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('username').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('password').focus();
    });

    function togglePassword() {
        const input = document.getElementById('password');
        const btn = document.getElementById('toggleBtn');
        if (input.type === 'password') {
            input.type = 'text';
            btn.textContent = '🙈';
        } else {
            input.type = 'password';
            btn.textContent = '👁️';
        }
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        document.getElementById('errorText').textContent = msg;
        el.classList.add('show');
    }

    function hideError() {
        document.getElementById('errorMsg').classList.remove('show');
    }

    function setLoading(loading) {
        const btn = document.getElementById('loginBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('loginBtnText');
        btn.disabled = loading;
        spinner.style.display = loading ? 'block' : 'none';
        btnText.textContent = loading ? 'Memverifikasi...' : '🔐 Masuk';
    }

    async function handleLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        hideError();

        if (!username || !password) {
            showError('Username dan password wajib diisi.');
            return;
        }

        setLoading(true);

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (!res.ok) {
                showError(data.error || 'Login gagal. Coba lagi.');
                setLoading(false);
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
                return;
            }

            // Store token in sessionStorage (cleared when browser/tab closes)
            sessionStorage.setItem('adminToken', data.token);
            sessionStorage.setItem('adminUsername', data.username);
            sessionStorage.setItem('adminRole', data.role || 'admin');

            // Redirect to admin dashboard
            window.location.href = '/admin';

        } catch (err) {
            showError('Tidak dapat terhubung ke server.');
            setLoading(false);
        }
    }
</script>
</body>
</html>
