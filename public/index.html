<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pizza Azura — Pesan pizza favorit Anda secara digital. Freshly Baked Est.2020">
    <title>Pizza Azura — Digital Ordering</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍕</text></svg>">
</head>
<body>

<!-- SPLASH / RECOMMENDED OVERLAY -->
<div class="splash-overlay" id="splashOverlay">
    <div class="splash-content">
        <div class="splash-image-wrap">
            <img src="/images/pizza_supreme.png" alt="Pizza Super Supreme" class="splash-pizza-img">
            <div class="splash-glow"></div>
        </div>
        <div class="splash-badge">🔥 REKOMMENDED</div>
        <h2 class="splash-title">Pizza Super Supreme</h2>
        <p class="splash-desc">Semua topping premium dalam satu pizza!</p>
        <div class="splash-price">Mulai dari <strong>Rp 55.000</strong></div>
        <button class="splash-cta" onclick="closeSplash()">Lihat Menu 🍕</button>
        <button class="splash-skip" onclick="closeSplash()">Lewati →</button>
    </div>
</div>

<!-- PIZZA BG DECORATIONS -->
<div class="pizza-deco deco-1">🍕</div>
<div class="pizza-deco deco-2">🧀</div>
<div class="pizza-deco deco-3">🌶️</div>

<!-- HEADER -->
<header class="header">
    <div class="header-inner">
        <a href="/" class="logo">
            <img src="/images/logo.png" alt="Pizza Azura" class="logo-img">
        </a>
        <div class="nav-links">
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle Light/Dark">
                <span class="theme-icon" id="themeIcon">☀️</span>
            </button>
            <button class="cart-btn" id="openCartBtn" onclick="openCart()">
                🛒 Keranjang
                <span class="cart-badge" id="cartBadge">0</span>
            </button>
        </div>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <div class="hero-glow"></div>
    <div class="hero-pizza-bg">
        <img src="/images/pizza_bg.png" alt="" class="hero-pizza-img">
    </div>
    <h1>Pesan <span>Pizza</span> Favoritmu<br>Tanpa Antri!</h1>
    <p class="hero-tagline">Freshly Baked Est.2020</p>
    <a href="https://wa.me/6285198042502" class="hero-wa" target="_blank">
        <svg class="wa-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        085198042502
    </a>
</section>

<!-- MENU GRID -->
<section class="menu-section">
    <h2 class="section-heading">🍕 Menu Kami</h2>
    <div class="menu-grid" id="menuGrid">
        <div class="loading-state"><div class="spinner"></div><p>Memuat menu...</p></div>
    </div>
</section>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
    <div class="modal">
        <div class="modal-header"><h2>Detail Menu</h2><button class="modal-close" onclick="closeModal('detailModal')">&times;</button></div>
        <div id="detailContent"></div>
    </div>
</div>

<!-- CART MODAL -->
<div class="modal-overlay" id="cartModal">
    <div class="modal">
        <div class="modal-header"><h2>🛒 Keranjang</h2><button class="modal-close" onclick="closeModal('cartModal')">&times;</button></div>
        <div id="cartContent"></div>
    </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-overlay" id="checkoutModal">
    <div class="modal">
        <div class="modal-header"><h2>📋 Checkout</h2><button class="modal-close" onclick="closeModal('checkoutModal')">&times;</button></div>
        <div id="checkoutContent"></div>
    </div>
</div>

<!-- SUCCESS MODAL -->
<div class="modal-overlay" id="successModal">
    <div class="modal success-modal">
        <div id="successContent"></div>
    </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/app.js"></script>
</body>
</html>
